name: sim-to-real-benchmark

# 資料調研方案 A：排程抓「公開」NEMAD 居禮溫度資料 → 跑 sim-to-real 對標，
# 把「合成 vs 真實」的落差變成持續可見的指標。資料不入版控（執行時抓取 + 引用），
# 故繞過 NEMAD repo 無 license 的疑慮。
#
# 觸發：每週一 06:00 UTC 排程 + 手動 workflow_dispatch。

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      # P1-a / F-NET-01, F-CI-01：釘為不可變 commit SHA（搭配下方 EXPECTED_NEMAD_SHA256 硬閘門）。
      NEMAD_REF: "main"
      NEMAD_PATH: "external/NEMAD/Dataset/FM_with_curie.csv"
      EXPECTED_NEMAD_SHA256: ""
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pandas scikit-learn matplotlib

      - name: Compute year-week (for weekly cache refresh)
        id: date
        run: echo "yw=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"

      # 以「年-週」為 key 快取資料，避免每跑都重抓（NEMAD 資料更新慢）
      - name: Cache NEMAD dataset
        id: nemad-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: external/NEMAD/Dataset
          key: nemad-fm-curie-${{ steps.date.outputs.yw }}

      - name: Download NEMAD dataset (if not cached)
        if: steps.nemad-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$(dirname "$NEMAD_PATH")"
          NEMAD_URL="https://raw.githubusercontent.com/sumanitani/NEMAD-MagneticML/${NEMAD_REF}/Dataset/FM_with_curie.csv"
          echo "Fetching $NEMAD_URL"
          curl -fsSL "$NEMAD_URL" -o "$NEMAD_PATH"

      - name: Verify dataset integrity (hard SHA-256 gate)
        run: |
          python - <<'PY'
          import os, sys, hashlib, pandas as pd
          p = os.environ["NEMAD_PATH"]
          digest = hashlib.sha256(open(p, "rb").read()).hexdigest()
          expected = os.environ.get("EXPECTED_NEMAD_SHA256", "").strip()
          print("NEMAD sha256:", digest)
          if not expected:
              print("::error::EXPECTED_NEMAD_SHA256 未設定。請把上面的 sha256 填入 workflow env，"
                    "並把 NEMAD_REF 釘為不可變 commit SHA。", file=sys.stderr)
              sys.exit(1)
          if digest.lower() != expected.lower():
              print(f"::error::NEMAD 完整性檢查失敗：expected {expected} got {digest}", file=sys.stderr)
              sys.exit(1)
          df = pd.read_csv(p)
          assert "Mean_TC_K" in df.columns, f"missing Tc column; got {list(df.columns)[:8]}"
          assert len(df) > 10000, f"unexpectedly few rows: {len(df)}"
          print(f"NEMAD integrity OK: rows={len(df)} cols={len(df.columns)}")
          PY

      - name: Train quick synthetic surrogate (for sim-to-real baseline)
        run: python scripts/train_surrogate.py --n-samples 4000 --epochs 60 --seed 0

      - name: Sim-to-real evaluation (synthetic surrogate vs real NEMAD Tc)
        run: |
          mkdir -p results
          python scripts/nemad_eval.py | tee results/nemad_eval.log

      - name: Real-Tc training baseline (proves achievable R²)
        run: |
          mkdir -p results
          python scripts/train_surrogate_nemad_baseline.py | tee results/nemad_baseline.log

      - name: Write run summary
        if: always()
        run: |
          {
            echo "## sim-to-real benchmark"
            echo '```'
            grep -E "R2|R²|MAE|rows=" results/*.log 2>/dev/null | tail -30 || echo "no metrics captured"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sim-to-real-results
          path: |
            results/**
          retention-days: 30
