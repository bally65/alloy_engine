name: retrain-pipeline

# Tier B 算力管線：讓 CI 當算力。手動或排程觸發 → 抓公開 NEMAD → 跑生產級
# 全管線（合成代理 → 真實 Tc baseline → 烘焙 bundle）→ 把 checkpoint 與量化
# 報告上傳成 artifact。如此「不需本地機器」也能拿到 .pt 產物（30 天保存）。
#
# 注意：MP 真實 Br 對標需 secret MP_API_KEY；未設則該步自動略過。

on:
  workflow_dispatch:
    inputs:
      n_samples:
        description: "合成樣本數"
        default: "8000"
      epochs:
        description: "訓練 epochs"
        default: "300"
  schedule:
    - cron: "0 7 1 * *"   # 每月 1 號 07:00 UTC

permissions:
  contents: read

jobs:
  retrain:
    runs-on: ubuntu-latest
    env:
      # P1-a / F-NET-01, F-CI-01：釘為不可變 commit SHA，避免上游 main 被竄改/漂移後
      # 無聲烘焙進已發布 checkpoint。設定：到 NEMAD repo 取目標 commit 的 40 字元 SHA 填此。
      NEMAD_REF: "main"
      NEMAD_PATH: "external/NEMAD/Dataset/FM_with_curie.csv"
      # 硬性完整性閘門：首次執行會印出實際 sha256 並失敗；把該值填入下行即啟用驗證。
      EXPECTED_NEMAD_SHA256: ""
      N_SAMPLES: ${{ github.event.inputs.n_samples || '8000' }}
      EPOCHS: ${{ github.event.inputs.epochs || '300' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pandas scikit-learn matplotlib

      - name: Download + verify NEMAD dataset (hard integrity gate)
        run: |
          mkdir -p "$(dirname "$NEMAD_PATH")"
          NEMAD_URL="https://raw.githubusercontent.com/sumanitani/NEMAD-MagneticML/${NEMAD_REF}/Dataset/FM_with_curie.csv"
          echo "Fetching $NEMAD_URL"
          curl -fsSL "$NEMAD_URL" -o "$NEMAD_PATH"
          python - <<'PY'
          import os, sys, hashlib, pandas as pd
          p = os.environ["NEMAD_PATH"]
          digest = hashlib.sha256(open(p, "rb").read()).hexdigest()
          expected = os.environ.get("EXPECTED_NEMAD_SHA256", "").strip()
          print("NEMAD sha256:", digest)
          if not expected:
              print("::error::EXPECTED_NEMAD_SHA256 未設定。請把上面的 sha256 填入 workflow env，"
                    "並把 NEMAD_REF 釘為不可變 commit SHA。", file=sys.stderr)
              sys.exit(1)
          if digest.lower() != expected.lower():
              print(f"::error::NEMAD 完整性檢查失敗：expected {expected} got {digest}", file=sys.stderr)
              sys.exit(1)
          df = pd.read_csv(p)
          assert "Mean_TC_K" in df.columns, f"missing Tc column; got {list(df.columns)[:8]}"
          assert len(df) > 10000, f"unexpectedly few rows: {len(df)}"
          print(f"NEMAD integrity OK: rows={len(df)} cols={len(df.columns)}")
          PY

      - name: Provide MP key (optional, from secret)
        env:
          MP_API_KEY: ${{ secrets.MP_API_KEY }}
        run: |
          if [ -n "$MP_API_KEY" ]; then
            mkdir -p external && printf '%s' "$MP_API_KEY" > external/.mp_key
            echo "MP key configured — Br eval will run"
          else
            echo "no MP_API_KEY secret — Br eval step will self-skip"
          fi

      - name: Run full pipeline
        run: bash scripts/run_full_pipeline.sh

      - name: Upload checkpoints + report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: retrained-pipeline
          path: |
            alloy_engine/models/checkpoints/*.pt
            results/pipeline_report.md
            results/*.png
          retention-days: 30
